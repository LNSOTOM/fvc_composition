services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8001:8001"
    command: ["micromamba", "run", "-n", "fvc_composition", "python", "app.py"]
    shm_size: "2gb"

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    # ForestFormer3D-style: keep a container alive for interactive exec/debug
    command: ["bash", "-lc", "sleep infinity"]
    tty: true
    stdin_open: true
    shm_size: "2gb"

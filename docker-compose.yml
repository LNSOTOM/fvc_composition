services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8001:8001"
    # Range-capable static server (required for COG streaming)
    command: ["micromamba", "run", "-n", "fvc_composition", "python", "bin/range_http_server.py", "8001", "--bind", "0.0.0.0"]
    shm_size: "2gb"

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    # ForestFormer3D-style: keep a container alive for interactive exec/debug
    command: ["bash", "-lc", "sleep infinity"]
    tty: true
    stdin_open: true
    shm_size: "2gb"
